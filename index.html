<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nairaland - Modern Nigerian Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        /* Background is now handled by Tailwind classes in App.tsx for dark mode support */
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'DM Sans', sans-serif;
      }
      /* Custom scrollbar for horizontal sections */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              naira: {
                50: '#FDFCF5', // Base background (Beige)
                100: '#F4F7F0',
                200: '#E1EAD8',
                300: '#C3D6B5',
                400: '#8FB878',
                500: '#16A34A', // Green accent
                600: '#128C3E',
                700: '#107033',
                800: '#14532D', // Deep forest green
                900: '#062C15', // Card background in Dark Mode
                950: '#01150a', // App background in Dark Mode (Very Deep Green)
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
